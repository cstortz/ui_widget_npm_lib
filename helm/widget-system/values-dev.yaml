global:
  imageTag: latest
  imagePullPolicy: Always
  imagePullSecrets:
    - name: ghcr-pull

demoAngular:
  replicaCount: 1

demoReact:
  replicaCount: 1

ingress:
  hosts:
    - host: widget-system.stortz.tech
      paths:
        - path: /angular
          pathType: Prefix
          service: demo-angular
        - path: /react
          pathType: Prefix
          service: demo-react
        - path: /
          pathType: Prefix
          service: demo-angular
