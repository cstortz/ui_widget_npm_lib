{{- if .Values.demoReact.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-react
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "widget-system.labels" . | nindent 4 }}
    app.kubernetes.io/name: demo-react
    app.kubernetes.io/component: demo
spec:
  replicas: {{ .Values.demoReact.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-react
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-react
        app.kubernetes.io/component: demo
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: demo-react
          image: "{{ .Values.demoReact.image.repository }}:{{ .Values.demoReact.image.tag | default (include "widget-system.imageTag" .) }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.demoReact.service.targetPort }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.demoReact.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: demo-react
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "widget-system.labels" . | nindent 4 }}
    app.kubernetes.io/name: demo-react
spec:
  selector:
    app.kubernetes.io/name: demo-react
  ports:
    - port: {{ .Values.demoReact.service.port }}
      targetPort: {{ .Values.demoReact.service.targetPort }}
      protocol: TCP
      name: http
  type: ClusterIP
{{- end }}
