name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build packages
        run: npm run build

      - name: Test
        run: npm run test

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build demo assets
        run: |
          npm ci
          npm run build -w @ncs_software/widget-system
          npm run build -w @ncs_software/widget-system-angular
          npm run build --workspace=demo-angular
          npm run build --workspace=demo-react

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build demo-angular image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/demo-angular/Dockerfile
          push: false
          tags: widget-system/demo-angular:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build demo-react image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/demo-react/Dockerfile
          push: false
          tags: widget-system/demo-react:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-lint:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Lint Helm chart
        run: helm lint helm/widget-system

      - name: Template Helm chart (dry-run)
        run: |
          helm template widget-system helm/widget-system \
            --values helm/widget-system/values.yaml \
            --values helm/widget-system/values-dev.yaml
