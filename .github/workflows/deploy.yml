name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod
      image_tag:
        description: Docker image tag (defaults to git SHA)
        required: false
        type: string

  push:
    branches: [main]
    paths:
      - "apps/**"
      - "helm/**"
      - ".github/workflows/deploy.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build demo assets
        run: |
          npm ci
          npm run build --workspace=demo-angular
          npm run build --workspace=demo-react

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then TAG="${{ github.sha }}"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push demo-angular
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/demo-angular/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/demo-angular:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/demo-angular:latest

      - name: Build and push demo-react
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/demo-react/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/demo-react:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/demo-react:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy with Helm
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          TAG="${{ needs.build-and-push.outputs.image_tag }}"
          VALUES="-f helm/widget-system/values.yaml"
          if [ "$ENV" = "dev" ]; then
            VALUES="$VALUES -f helm/widget-system/values-dev.yaml"
          elif [ "$ENV" = "staging" ]; then
            VALUES="$VALUES -f helm/widget-system/values-staging.yaml"
          elif [ "$ENV" = "prod" ]; then
            VALUES="$VALUES -f helm/widget-system/values-prod.yaml"
          fi
          helm upgrade --install widget-system helm/widget-system \
            $VALUES \
            --namespace widget-system \
            --create-namespace \
            --set global.imageTag="$TAG" \
            --set demoAngular.image.repository="${{ env.IMAGE_PREFIX }}/demo-angular" \
            --set demoReact.image.repository="${{ env.IMAGE_PREFIX }}/demo-react" \
            --wait --timeout 5m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/demo-angular -n widget-system --timeout=120s
          kubectl rollout status deployment/demo-react -n widget-system --timeout=120s
          kubectl get pods,svc,ingress -n widget-system
