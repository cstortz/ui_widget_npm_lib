name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod
      image_tag:
        description: Docker image tag (defaults to git SHA)
        required: false
        type: string

  push:
    branches: [main]
    paths:
      - "apps/**"
      - "helm/**"
      - ".github/workflows/deploy.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build demo assets
        run: |
          npm ci
          npm run build --workspace=demo-angular
          npm run build --workspace=demo-react

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then TAG="${{ github.sha }}"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push demo-angular
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/demo-angular/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/demo-angular:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/demo-angular:latest

      - name: Build and push demo-react
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/demo-react/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/demo-react:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/demo-react:latest

  deploy:
    # Private cluster (192.168.x.x) — must run on a runner on your LAN (e.g. dev01)
    runs-on: self-hosted
    needs: build-and-push
    environment: ${{ github.event.inputs.environment || 'dev' }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p "$HOME/.kube"

          # Self-hosted runner on dev01 may already have a working ~/.kube/config
          if [ -z "$KUBE_CONFIG_DATA" ] && [ -f "$HOME/.kube/config" ]; then
            echo "Using existing kubeconfig on self-hosted runner"
          elif [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "::error::KUBE_CONFIG secret is empty and no ~/.kube/config on runner."
            exit 1
          elif printf '%s' "$KUBE_CONFIG_DATA" | head -1 | grep -qE '^apiVersion:'; then
            printf '%s' "$KUBE_CONFIG_DATA" > "$HOME/.kube/config"
          elif printf '%s' "$KUBE_CONFIG_DATA" | tr -d ' \t\r\n' | base64 -d > "$HOME/.kube/config" 2>/dev/null \
            && [ -s "$HOME/.kube/config" ]; then
            true
          else
            echo "::error::KUBE_CONFIG is not valid. Use base64-encoded kubeconfig or paste raw ~/.kube/config YAML."
            exit 1
          fi

          chmod 600 "$HOME/.kube/config"

          if ! kubectl config current-context >/dev/null 2>&1; then
            echo "::error::Kubeconfig loaded but no valid context found."
            exit 1
          fi

          echo "Using kubectl context: $(kubectl config current-context)"
          kubectl cluster-info

      - name: Create GHCR pull secret
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOKEN="${GHCR_TOKEN:-$GITHUB_TOKEN}"
          if [ -z "$TOKEN" ]; then
            echo "::error::No GHCR_TOKEN or GITHUB_TOKEN available for pull secret"
            exit 1
          fi
          kubectl create namespace widget-system --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-pull \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="$TOKEN" \
            --namespace=widget-system \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          TAG="${{ needs.build-and-push.outputs.image_tag }}"
          VALUES="-f helm/widget-system/values.yaml"
          if [ "$ENV" = "dev" ]; then
            VALUES="$VALUES -f helm/widget-system/values-dev.yaml"
          elif [ "$ENV" = "staging" ]; then
            VALUES="$VALUES -f helm/widget-system/values-staging.yaml"
          elif [ "$ENV" = "prod" ]; then
            VALUES="$VALUES -f helm/widget-system/values-prod.yaml"
          fi
          if ! helm upgrade --install widget-system helm/widget-system \
            $VALUES \
            --namespace widget-system \
            --create-namespace \
            --set global.imageTag="$TAG" \
            --set demoAngular.image.repository="${{ env.IMAGE_PREFIX }}/demo-angular" \
            --set demoReact.image.repository="${{ env.IMAGE_PREFIX }}/demo-react" \
            --wait --timeout 5m; then
            echo "::group::Pod diagnostics"
            kubectl get pods -n widget-system -o wide
            kubectl describe pods -n widget-system | tail -80
            kubectl get events -n widget-system --sort-by='.lastTimestamp' | tail -20
            echo "::endgroup::"
            exit 1
          fi

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/demo-angular -n widget-system --timeout=120s
          kubectl rollout status deployment/demo-react -n widget-system --timeout=120s
          kubectl get pods,svc,ingress -n widget-system
